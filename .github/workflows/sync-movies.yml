name: Sync Movies

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: false
        default: "latest"
        type: choice
        options:
          - latest
          - full

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync movies
        run: npm run sync -- --mode=${{ github.event.inputs.mode || 'latest' }}

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git diff --staged --quiet || git commit -m "chore: sync movie data"

      - name: Push changes
        run: git push
